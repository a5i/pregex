name: release

# Triggered by pushing a tag like `v0.1.0`. Publishes the Rust crate to
# crates.io, the Node native package to npm, and Python wheels to PyPI.
#
# Secrets / setup required (see .local/ci-config.md):
#   * CARGO_REGISTRY_TOKEN  -> https://crates.io settings (or switch to Trusted Publishing)
#   * NPM_TOKEN             -> https://npmjs.com access token (Automation / Granular)
#   * PyPI Trusted Publishing: register this workflow + `pypi` environment at
#     https://pypi.org/manage/project/pregex/settings/publishing/
#
# All three manifests must report the same version as the tag:
#   Cargo.toml, crates/pregex-node/package.json, crates/pregex-python/pyproject.toml

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    name: Check version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify versions match tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"

          CRATE_VERSION=$(grep -m1 '^version =' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          NODE_VERSION=$(grep -m1 '"version"' crates/pregex-node/package.json | sed 's/.*: "\(.*\)".*/\1/' | tr -d ',')
          PY_VERSION=$(grep -m1 '^version =' crates/pregex-python/pyproject.toml | sed 's/version = "\(.*\)"/\1/')

          echo "tag=$TAG crate=$CRATE_VERSION node=$NODE_VERSION python=$PY_VERSION"

          test "$TAG" = "$CRATE_VERSION"
          test "$TAG" = "$NODE_VERSION"
          test "$TAG" = "$PY_VERSION"

  test:
    name: Test Rust core
    runs-on: ubuntu-latest
    needs: check-version
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Test workspace
        run: cargo test --workspace --all-features

  publish-crate:
    name: Publish crate to crates.io
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish
        run: cargo publish -p pregex
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-node:
    name: Build Node (${{ matrix.target }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,   target: x86_64-unknown-linux-gnu  }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: macos-latest,    target: aarch64-apple-darwin      }
          - { os: macos-13,        target: x86_64-apple-darwin       }
          - { os: windows-latest,  target: x86_64-pc-windows-msvc    }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/pregex-node/package-lock.json

      - name: Install dependencies
        working-directory: crates/pregex-node
        run: npm ci

      - name: Build native addon
        working-directory: crates/pregex-node
        run: npx napi build --release --platform --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.target }}
          path: |
            crates/pregex-node/*.node
            crates/pregex-node/index.js
            crates/pregex-node/index.d.ts

  publish-node:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-node
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: crates/pregex-node/package-lock.json

      - name: Install dependencies
        working-directory: crates/pregex-node
        run: npm ci

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: node-*
          path: crates/pregex-node
          merge-multiple: true

      - name: Publish
        working-directory: crates/pregex-node
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-python:
    name: Build Python (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-13]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --manifest-path crates/pregex-python/Cargo.toml --out dist
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.os }}
          path: dist

  publish-python:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-python
    environment:
      name: pypi
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: python-wheels-*
          path: dist
          merge-multiple: true

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
